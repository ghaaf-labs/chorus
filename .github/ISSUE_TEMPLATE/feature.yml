name: Feature request
description: Propose a change to Chorus
title: "[feature]: "
labels: ["Task"]
body:
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What workflow is blocked or painful today?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What workarounds or competing tools have you tried?
    validations:
      required: true
  - type: dropdown
    id: willing
    attributes:
      label: Willing to PR?
      options:
        - "Yes"
        - "No"
        - "Maybe"
    validations:
      required: true
