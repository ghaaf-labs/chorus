name: Eval Gate

on:
  pull_request:
    branches: [main]
  push:
    tags: ['v*']

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Deterministic eval baseline
        run: node scripts/build-eval-baseline.mjs
      - name: Trust CI gate on clean history
        run: ./bin/chorus trust --ci
